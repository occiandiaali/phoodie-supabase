<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/pin-map.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Find Food | Good meals around you</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <style>
      body {
        font-family: Arial, Helvetica, sans-serif;
        background: rgb(222, 223, 220);
      }
      .appName {
        position: absolute;
        top: 0;
        left: 10%;
        font-family: cursive, Arial, Helvetica, sans-serif;

        /* text-shadow: 2px 2px 5px red; */
        text-shadow: 2px 2px 5px magenta;
        z-index: 1000;
      }
      #map {
        height: 96vh;
      }

      .modal {
        position: fixed;
        top: 8%;
        left: 50%;
        transform: translateX(-50%);
        background: white;
        padding: 1em;
        border: 1px solid #ccc;
        display: none;
        z-index: 1002;
        min-width: 320px;
      }
      .modal-content {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        overflow: auto;
      }
      .comments {
        max-height: 150px;
        overflow-y: auto;
        border: 1px solid #eee;
        padding: 0.5em;
        margin-bottom: 1em;
      }
      .comment {
        margin-bottom: 0.5em;
        border-bottom: 1px solid #ddd;
        padding-bottom: 0.5em;
      }
      .restaurant-img {
        width: 80%;
        height: 120px;
        object-fit: cover;
        /* margin-bottom: 1em; */
        margin: 4px auto;
        border: 1px solid #ddd;
      }
      .close-btn {
        float: right;

        cursor: pointer;
        font-weight: bold;
        color: #f00909;
        z-index: 1005;
      }
      input {
        padding: 6px;
        margin: 4px;
      }
      button {
        background-color: black;
        color: white;
        border: none;
        padding: 8px;
      }
      button:hover {
        background-color: white;
        color: black;
        border: 1px solid black;
        cursor: pointer;
        margin: 4px;
      }
      textarea {
        padding: 6px;
      }
      #savingEntry {
        display: none;
        color: teal;
      }
      #saveComment {
        display: none;
        color: rgb(206, 10, 163);
      }

      @media (max-width: 600px) {
        .appName {
          left: 25%;
        }
        h3 {
          margin-left: 13%;
        }
        .close-btn {
          margin-right: 32px;
        }
        .modal-content {
          display: flex;
          flex-direction: column;
          justify-content: center;
          align-items: center;
          width: 100%;
          padding: 4px;
          background-color: rgb(253, 249, 234);
          overflow: auto;
        }
      }
    </style>
  </head>
  <body>
    <!-- <div id="app"></div> -->
    <!-- <script type="module" src="/src/main.js"></script> -->
    <!-- <script type="module" src="/src/mapper.js"></script> -->
    <h1 class="appName">FindFood</h1>
    <div id="map"></div>
    <div id="modal" class="modal"></div>

    <script type="module">
      import { createClient } from "@supabase/supabase-js";
      import earthLogo from "/src/assets/bluearth.jpg";

      const supabaseUrl = import.meta.env.VITE_SUPABASE_URL;
      const supabaseAnonKey = import.meta.env.VITE_SUPABASE_ANON_KEY;

      const supabase = createClient(supabaseUrl, supabaseAnonKey);

      // const PLACEHOLDER_IMG =
      //   "https://via.placeholder.com/320x180?text=No+Image";
      const PLACEHOLDER_IMG = earthLogo;

      // Helper: haversine distance in meters
      function distance(lat1, lon1, lat2, lon2) {
        const R = 6371e3; // meters
        const toRad = (x) => (x * Math.PI) / 180;
        const φ1 = toRad(lat1),
          φ2 = toRad(lat2);
        const Δφ = toRad(lat2 - lat1);
        const Δλ = toRad(lon2 - lon1);
        const a =
          Math.sin(Δφ / 2) ** 2 +
          Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ / 2) ** 2;
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        return R * c;
      }

      // Initialize map with fallback center
      function initMap(lat = 6.5244, lng = 3.3792, radius = 1000) {
        const map = L.map("map").setView([lat, lng], 13);
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(
          map,
        );

        L.circle([lat, lng], { radius }).addTo(map);

        return map;
      }

      // Main logic
      if (!navigator.geolocation) {
        alert(
          "Geolocation is not supported by your browser. Showing default view.",
        );
        const map = initMap(); // fallback to Lagos center
      } else {
        navigator.geolocation.getCurrentPosition(
          successCallback,
          errorCallback,
        );
      }

      async function successCallback(pos) {
        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;
        const radius = 1000; // 1 km

        const map = initMap(lat, lng, radius);

        // User marker
        L.marker([lat, lng]).addTo(map).bindPopup("You are here");

        // Fetch restaurants
        const { data: restaurants } = await supabase
          .from("restaurants")
          .select("*");

        // Place markers within radius
        restaurants
          .filter((r) => distance(lat, lng, r.lat, r.lng) <= radius)
          .forEach((r) => {
            const marker = L.marker([r.lat, r.lng]).addTo(map);
            marker.on("click", () => showModal(r, lat, lng));
          });

        // Allow adding at exact user location
        const userMarker = L.marker([lat, lng]).addTo(map);
        userMarker.on("click", async () => {
          const { data } = await supabase
            .from("restaurants")
            .select("*")
            .eq("lat", lat)
            .eq("lng", lng);

          if (!data || data.length === 0) {
            showModal(null, lat, lng);
          } else {
            showModal(data[0], lat, lng);
          }
        });
      }

      function errorCallback(err) {
        alert("Unable to retrieve your location. Showing default view.");
        const map = initMap(); // fallback to Lagos center
      }

      function closeModal() {
        document.getElementById("modal").style.display = "none";
      }

      // Modal logic
      async function showModal(restaurant, lat, lng) {
        const modal = document.getElementById("modal");
        modal.style.display = "block";

        if (!restaurant) {
          modal.innerHTML = `
      <span class="close-btn" id="closeBtn1">✖</span>
      <div class="modal-content">
      <h3>Be the first to review this location</h3>
      <form id="newForm">
        <input name="name" placeholder="Restaurant name" required><br>
        <input name="address" placeholder="Restaurant address"><br>
        <textarea rows="5" cols="26" name="review" placeholder="Review" required></textarea><br>

        <button type="submit">Save</button>
        <p id="savingEntry">Saving..</p>
      </form>
      </div>
    `;

          document
            .getElementById("closeBtn1")
            .addEventListener("click", closeModal);

          document.getElementById("newForm").onsubmit = async (e) => {
            try {
              e.preventDefault();
              document.getElementById("savingEntry").style.display = "block";
              const form = e.target;

              await supabase.from("restaurants").insert({
                name: form.name.value,
                review: form.review.value,
                address: form.address.value,
                lat,
                lng,
              });

              closeModal();
              alert("Restaurant added!");
            } catch (error) {
              alert("Oops! Couldn't save your entry. Try again?");
            } finally {
              document.getElementById("savingEntry").style.display = "none";
            }
          };
        } else {
          const { data: comments } = await supabase
            .from("comments")
            .select("*")
            .eq("restaurant_id", restaurant.id)
            .order("created_at", { ascending: false });

          const commentsHTML =
            comments && comments.length > 0
              ? comments
                  .map((c) => `<div class="comment">${c.comment}</div>`)
                  .join("")
              : "<p>No comments yet.</p>";

          // const imgSrc = restaurant.image_url
          //   ? restaurant.image_url
          //   : PLACEHOLDER_IMG;
          //<img src="${imgSrc}" alt="Restaurant Image" class="restaurant-img">

          modal.innerHTML = `
      <span class="close-btn" id="closeBtn2">✖</span>
      <div class="modal-content">
      <h3>${restaurant.name}</h3>
      <p>${restaurant.address}</p>
      <p style="border:1px solid wheat;padding:6px;">${restaurant.review}</p>
      
      <div class="comments">${commentsHTML}</div>
      <h4>Add Comment</h4>
      <form id="commentForm">
        <textarea rows="3" name="comment" required></textarea><br>
        <button type="submit">Save Comment</button>
        <p id="saveComment">Saving..</p>
      </form>
      </div>
    `;

          document
            .getElementById("closeBtn2")
            .addEventListener("click", closeModal);

          document.getElementById("commentForm").onsubmit = async (e) => {
            try {
              e.preventDefault();
              document.getElementById("saveComment").style.display = "block";
              const form = e.target;
              await supabase.from("comments").insert({
                restaurant_id: restaurant.id,
                comment: form.comment.value,
              });
              closeModal();
              alert("Comment added!");
            } catch (error) {
              alert("Couldn't add your comment. Try again?");
            } finally {
              document.getElementById("saveComment").style.display = "none";
            }
          };
        }
      }
    </script>
  </body>
</html>
